<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Amine Fellah — Photographer" />
<title>Amine Fellah | Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0b0c;
    --panel: #161618;
    --line: rgba(255,255,255,.09);
    --text: #f4f3ef;
    --muted: #9b9a95;
    --accent: #ffffff;
    --accent-dim: rgba(255,255,255,.14);
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Inter', system-ui, -apple-system, sans-serif;
    --ease: cubic-bezier(.22,.61,.36,1);
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.6;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 60px 24px;
    -webkit-font-smoothing: antialiased;
  }
  
  a { text-decoration: none; color: inherit; }
  
  .container {
    width: 100%;
    max-width: 480px;
    text-align: center;
    animation: fadeIn 0.8s var(--ease) forwards;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* Profile Section */
  .profile { margin-bottom: 40px; }
  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--panel);
    border: 2px solid var(--accent);
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 2.2rem;
    color: var(--text);
    font-weight: 500;
    box-shadow: 0 0 20px var(--accent-dim);
  }
  
  h1 {
    font-family: var(--serif);
    font-size: 1.8rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  
  h1 em { font-style: italic; color: var(--accent); }
  
  .role {
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 16px;
  }
  
  .bio {
    font-size: 0.95rem;
    color: var(--muted);
    max-width: 380px;
    margin: 0 auto;
  }
  
  /* Links Section */
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  
  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 18px 24px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    font-size: 0.95rem;
    font-weight: 500;
    transition: transform 0.3s var(--ease), border-color 0.3s var(--ease), background 0.3s var(--ease);
  }
  
  .link-btn:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
    transform: translateY(-4px);
  }
  
  .link-btn svg {
    width: 20px;
    height: 20px;
    color: var(--accent);
  }

  /* Social Icons */
  .socials {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 40px;
  }
  
  .social-icon {
    color: var(--muted);
    transition: color 0.3s var(--ease), transform 0.3s var(--ease);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .social-icon:hover {
    color: var(--accent);
    transform: translateY(-3px);
  }
  
  .social-icon svg { width: 24px; height: 24px; }
  
  /* Footer */
  .footer {
    margin-top: 50px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 0.8rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="container">
  <!-- Profile -->
  <div class="profile">
    <div class="avatar">AF</div>
    <h1>Amine <em>Fellah</em></h1>
    <div class="role">Photographer</div>
    <p class="bio">17-year-old freelance photographer.</p>
  </div>
  
  <!-- Main Links -->
  <div class="links">
    <a href="mailto:fellah.amine2050@gmail.com" class="link-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
      Email Me
    </a>
    
    <a href="tel:0562664409" class="link-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.5 2.1L8.1 9.6a16 16 0 0 0 6 6l1.2-1.1a2 2 0 0 1 2.1-.5c.8.3 1.7.5 2.6.6a2 2 0 0 1 1.7 2Z"/></svg>
      Call / WhatsApp
    </a>
  </div>
  
  <!-- Social Links -->
  <div class="socials">
    <a href="https://instagram.com/2050_fh" class="social-icon" target="_blank" rel="noopener" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
    </a>
  </div>

  <div class="footer">
    © <span id="yr"></span> Amine Fellah
  </div>
</div>

<script>
  document.getElementById('yr').textContent = new Date().getFullYear();
</script>
</body>
</html>
