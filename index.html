<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Amine Fellah — AI & Web Developer Links" />
<title>Amine Fellah | Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0a0d;
    --panel: #18151a;
    --line: rgba(201,164,99,.16);
    --text: #f3ede2;
    --muted: #9c9488;
    --accent: #c9a463;
    --accent-bright: #e8c98a;
    --accent-dim: rgba(201,164,99,.14);
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Inter', system-ui, -apple-system, sans-serif;
    --ease: cubic-bezier(.22,.61,.36,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { background: var(--bg); }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.6;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 60px 24px;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  /* Ambient drifting glow behind everything */
  body::before {
    content: '';
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(circle at 28% 22%, rgba(201,164,99,.14), transparent 55%),
      radial-gradient(circle at 74% 78%, rgba(201,164,99,.08), transparent 60%);
    filter: blur(50px);
    animation: drift 20s ease-in-out infinite alternate;
    z-index: -1;
    pointer-events: none;
  }

  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(3%, -3%) scale(1.08); }
  }

  a { text-decoration: none; color: inherit; }

  a:focus-visible, .hobby-card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 4px;
    border-radius: 8px;
  }

  .container {
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .profile, .hobby-card, .link-btn, .socials, .footer {
    opacity: 0;
    animation: fadeInUp .8s var(--ease) forwards;
  }

  /* Profile Section */
  .profile { margin-bottom: 30px; animation-delay: .05s; }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--panel);
    border: 2px solid var(--accent);
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 2.2rem;
    color: var(--text);
    font-weight: 500;
    animation: glowPulse 3.6s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 18px rgba(201,164,99,.25), 0 0 0 rgba(201,164,99,0); }
    50%      { box-shadow: 0 0 34px rgba(201,164,99,.45), 0 0 12px rgba(201,164,99,.18); }
  }

  h1 {
    font-family: var(--serif);
    font-size: 1.8rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  h1 em {
    font-style: italic;
    background: linear-gradient(100deg, var(--accent) 0%, var(--accent-bright) 30%, var(--accent) 60%, var(--accent-bright) 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 5s linear infinite;
  }

  @keyframes shimmer {
    to { background-position: -200% center; }
  }

  .role {
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .bio {
    font-size: 0.95rem;
    color: var(--muted);
    max-width: 380px;
    margin: 0 auto;
  }

  /* Hobbies Grid Section */
  .hobbies {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .hobby-card {
    position: relative;
    overflow: hidden;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform .3s var(--ease), border-color .3s var(--ease), background .3s var(--ease), box-shadow .3s var(--ease);
    animation-delay: calc(.15s + (var(--i) * .08s));
  }

  .hobby-card:nth-child(1) { --i: 1; }
  .hobby-card:nth-child(2) { --i: 2; }
  .hobby-card:nth-child(3) { --i: 3; }
  .hobby-card:nth-child(4) { --i: 4; }
  .hobby-card:nth-child(5) { --i: 5; }

  /* لجعل البطاقة الفردية الأخيرة (التصوير) تأخذ عرض الشبكة بالكامل */
  .hobby-card:last-child:nth-child(odd) {
    grid-column: 1 / -1;
  }

  .hobby-card::after, .link-btn::after {
    content: '';
    position: absolute;
    top: 0; left: -75%;
    width: 50%; height: 100%;
    background: linear-gradient(120deg, transparent, rgba(232,201,138,.16), transparent);
    transform: skewX(-20deg);
    transition: left .6s var(--ease);
    pointer-events: none;
  }

  .hobby-card:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
    transform: translateY(-4px);
    box-shadow: 0 10px 26px rgba(201,164,99,.14);
  }

  .hobby-card:hover::after, .link-btn:hover::after { left: 125%; }

  .hobby-icon {
    font-size: 1.8rem;
    margin-bottom: 8px;
  }

  .hobby-title {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
  }

  .hobby-stat {
    font-size: 0.75rem;
    color: var(--accent);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  /* Links Section */
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 18px 24px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    font-size: 0.95rem;
    font-weight: 500;
    transition: transform .3s var(--ease), border-color .3s var(--ease), background .3s var(--ease), box-shadow .3s var(--ease);
    animation-delay: .55s;
  }

  .link-btn:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
    transform: translateY(-4px);
    box-shadow: 0 10px 26px rgba(201,164,99,.16);
  }

  .link-btn svg {
    width: 20px;
    height: 20px;
    color: var(--accent);
  }

  /* Social Icons */
  .socials {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 40px;
    animation-delay: .65s;
  }

  .social-icon {
    color: var(--muted);
    transition: color .3s var(--ease), transform .3s var(--ease);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .social-icon:hover {
    color: var(--accent);
    transform: translateY(-3px) scale(1.08);
  }

  .social-icon svg { width: 24px; height: 24px; }

  /* Footer */
  .footer {
    margin-top: 50px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 0.8rem;
    color: var(--muted);
    animation-delay: .75s;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .001ms !important;
    }
    .profile, .hobby-card, .link-btn, .socials, .footer { opacity: 1; }
    body::before { display: none; }
  }
</style>
</head>
