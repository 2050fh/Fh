<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Amine Fellah — AI & Web Developer Links" />
<title>Amine Fellah | Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0b0c;
    --panel: #161618;
    --line: rgba(255,255,255,.09);
    --text: #f4f3ef;
    --muted: #9b9a95;
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,.14);
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Inter', system-ui, -apple-system, sans-serif;
    --ease: cubic-bezier(.22,.61,.36,1);
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.6;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 60px 24px;
    -webkit-font-smoothing: antialiased;
  }
  
  a { text-decoration: none; color: inherit; }
  
  .container {
    width: 100%;
    max-width: 480px;
    text-align: center;
    animation: fadeIn 0.8s var(--ease) forwards;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* Profile Section */
  .profile { margin-bottom: 30px; }
  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--panel);
    border: 2px solid var(--accent);
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 2.2rem;
    color: var(--text);
    font-weight: 500;
    box-shadow: 0 0 20px var(--accent-dim);
  }
  
  h1 {
    font-family: var(--serif);
    font-size: 1.8rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  
  h1 em { font-style: italic; color: var(--accent); }
  
  .role {
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 16px;
  }
  
  .bio {
    font-size: 0.95rem;
    color: var(--muted);
    max-width: 380px;
    margin: 0 auto;
  }

  /* Hobbies Grid Section */
  .hobbies {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .hobby-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s var(--ease), border-color 0.3s var(--ease), background 0.3s var(--ease);
  }

  /* لجعل البطاقة الفردية الأخيرة (التصوير) تأخذ عرض الشبكة بالكامل */
  .hobby-card:last-child:nth-child(odd) {
    grid-column: 1 / -1;
  }

  .hobby-card:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
    transform: translateY(-4px);
  }

  .hobby-icon {
    font-size: 1.8rem;
    margin-bottom: 8px;
  }

  .hobby-title {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
  }

  .hobby-stat {
    font-size: 0.75rem;
    color: var(--accent);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }
  
  /* Links Section */
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  
  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 18px 24px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    font-size: 0.95rem;
    font-weight: 500;
    transition: transform 0.3s var(--ease), border-color 0.3s var(--ease), background 0.3s var(--ease);
  }
  
  .link-btn:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
    transform: translateY(-4px);
  }
  
  .link-btn svg {
    width: 20px;
    height: 20px;
    color: var(--accent);
  }

  /* Social Icons */
  .socials {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 40px;
  }
  
  .social-icon {
    color: var(--muted);
    transition: color 0.3s var(--ease), transform 0.3s var(--ease);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .social-icon:hover {
    color: var(--accent);
    transform: translateY(-3px);
  }
  
  .social-icon svg { width: 24px; height: 24px; }
  
  /* Footer */
  .footer {
    margin-top: 50px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 0.8rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="container">

  <div class="footer">

</html>
